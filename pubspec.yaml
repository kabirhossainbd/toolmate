name: toolmate
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.10.7


# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dio: ^5.4.1
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  device_info_plus: ^10.1.0
  photo_manager: ^3.0.0
  photo_manager_image_provider: ^2.0.0
  notification_listener_service: ^0.3.5
  storage_space: ^1.2.0
  crypto: ^3.0.7
  gallery_saver_plus: ^3.2.9
  intl: ^0.20.2
  youtube_explode_dart: ^3.0.5
  share_plus: ^12.0.1
  image_picker: ^1.1.2
  font_awesome_flutter: ^10.12.0
  flutter_animate: ^4.5.2
  installed_apps: ^2.1.1
  video_player: ^2.8.2
  chewie: ^1.7.5
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7


# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/

  # example:
  fonts:
    - family: Open_Sans
      fonts:
        - asset: assets/font/Open_Sans/OpenSans-Light.ttf
          weight: 300
        - asset: assets/font/Open_Sans/OpenSans-Regular.ttf
          weight: 400
        - asset: assets/font/Open_Sans/OpenSans-Medium.ttf
          weight: 500
        - asset: assets/font/Open_Sans/OpenSans-SemiBold.ttf
          weight: 600
        - asset: assets/font/Open_Sans/OpenSans-Bold.ttf
          weight: 700
        - asset: assets/font/Open_Sans/OpenSans-ExtraBold.ttf
          weight: 800


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#121212"
  image: "assets/icon.png"
  color_dark: "#121212"
  image_dark: "assets/icon.png"
  android_12:
    image: "assets/icon.png"
    icon_background_color: "#121212"
    image_dark: "assets/icon.png"
    icon_background_color_dark: "#121212"
